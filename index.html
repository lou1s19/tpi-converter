<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - TPI Media</title>
  <link rel="icon" type="image/png" href="bilder/fav.png" />
  <link rel="stylesheet" href="css/style.css?v=1.1" />
  <script defer src="js/main.js?v=1.1"></script>
</head>

<body class="dashboard-page">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <header class="mobile-header">
    <span class="mobile-brand"></span>
    <button class="menu-toggle" id="menu-toggle" aria-label="Menü öffnen">
      <svg viewBox="0 0 24 24" class="svg-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
  </header>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="index.html">
        <span class="brand-mark" aria-hidden="true">
          <img class="brand-logo" src="Logo_1920x1080.jpg" alt="" />
        </span>
        </a>

      <nav class="sidebar-nav" aria-label="Hauptnavigation">
        <span class="nav-category">Menü</span>
        <a class="nav-item active" href="index.html">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="svg-icon"><path d="M4 11.5 12 5l8 6.5v7.5h-5.2v-5.6H9.2V19H4z" /></svg>
          </span>
          <span>Dashboard</span>
        </a>
        <a class="nav-item" href="webp-converter/index.html">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="svg-icon"><path d="M5 3h10l4 4v14H5zm9 1.8V8h3.2zM7 12.2h1.2l.5 3.5.8-3.5h1l.8 3.5.5-3.5H13L12 18h-1.2l-.8-3.4L9.2 18H8zm6.8 0h3.1c1.1 0 1.8.7 1.8 1.7s-.7 1.7-1.8 1.7H15V18h-1.2zm1.2 1v1.4h1.7c.5 0 .8-.3.8-.7s-.3-.7-.8-.7z" /></svg>
          </span>
          <span>WebP-Konverter</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <span class="nav-category">Support</span>
        <a class="nav-item secondary" href="help/index.html">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="svg-icon"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm0 17a1.25 1.25 0 1 1 1.25-1.25A1.25 1.25 0 0 1 12 19Zm1-4.1v.6h-2v-1.1a3.4 3.4 0 0 1 1.6-2.9c.8-.6 1.4-1 1.4-2a2.1 2.1 0 0 0-4.2 0H8a4 4 0 0 1 8 0c0 1.8-1 2.6-2 3.3a2.2 2.2 0 0 0-1 2.1Z" /></svg>
          </span>
          <span>Hilfe</span>
        </a>
        <a class="nav-item secondary" href="contact/index.html">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="svg-icon"><path d="M12 3.5A4.5 4.5 0 0 0 7.5 8v8A4.5 4.5 0 0 0 12 20.5h0A4.5 4.5 0 0 0 16.5 16v-8A4.5 4.5 0 0 0 12 3.5Zm0 2A2.5 2.5 0 0 1 14.5 8v8a2.5 2.5 0 0 1-5 0v-8A2.5 2.5 0 0 1 12 5.5Zm0 2a1.5 1.5 0 0 0-1.5 1.5v6a1.5 1.5 0 0 0 3 0V9A1.5 1.5 0 0 0 12 7.5Z" /></svg>
          </span>
          <span>Kontakt</span>
        </a>
      </div>
    </aside>

    <div class="workspace">
      <main class="dashboard-main">
        <section class="hero">
          <h1>Dashboard</h1>
          <p class="hero-copy">
            Alle Werkzeuge an einem Ort. Schnell und lokal.
          </p>
        </section>

        <section class="dashboard-grid">
          <div class="section-head">
            <div>
              <h2>Werkzeuge</h2>
              <p>
                Öffne den WebP-Konverter direkt aus dem Dashboard.
              </p>
            </div>
          </div>

          <div class="tools-grid">
            <a class="tool-card" href="webp-converter/index.html" data-category="media">
              <div class="tool-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" class="svg-icon"><path d="M5 3h10l4 4v14H5zm9 1.8V8h3.2zM7 12.2h1.2l.5 3.5.8-3.5h1l.8 3.5.5-3.5H13L12 18h-1.2l-.8-3.4L9.2 18H8zm6.8 0h3.1c1.1 0 1.8.7 1.8 1.7s-.7 1.7-1.8 1.7H15V18h-1.2zm1.2 1v1.4h1.7c.5 0 .8-.3.8-.7s-.3-.7-.8-.7z" /></svg>
              </div>
              <h3 class="tool-title">WebP-Konverter</h3>
              <p class="tool-description">
                Bilder lokal konvertieren, skalieren und als ZIP exportieren.
              </p>
            </a>
          </div>
        </section>
      </main>

    </div>
  </div>

</html>
